<!DOCTYPE html>
<html>
<head>
<title>Inbox</title>

<style>
body {
    font-family: Arial;
    background: #f1f3f4;
    margin: 0;
}

.container {
    width: 800px;
    margin: 30px auto;
    background: white;
    border-radius: 8px;
}

.header {
    padding: 15px;
    background: #202124;
    color: white;
    font-size: 18px;
}

.email {
    padding: 15px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

.email:hover {
    background: #f5f5f5;
}

.sender {
    font-weight: bold;
}

.subject {
    font-size: 15px;
}

.preview {
    color: gray;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">📧 Inbox</div>

<div class="email" onclick="window.location='/email'">
    <div class="sender">Security Team</div>
    <div class="subject">⚠ Account Activity Alert</div>
    <div class="preview">We noticed a recent login attempt...</div>
</div>

</div>

</body>
</html>
